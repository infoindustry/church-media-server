name = "church-media-cloud-portal"
main = "src/worker.js"
compatibility_date = "2026-06-14"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true
head_sampling_rate = 1

[triggers]
crons = ["17 3 * * *"]

[[d1_databases]]
binding = "DB"
database_name = "church_media_portal"
database_id = "60142f8d-0ba1-4fd4-985d-1fcd7fc0e2f0"

[[r2_buckets]]
binding = "MEDIA_BUCKET"
bucket_name = "church-media-transfer"

[vars]
R2_ACCOUNT_ID = "a18111a19b3effcf4fd0391e6f23a4ae"
R2_BUCKET_NAME = "church-media-transfer"
SESSION_TTL_SECONDS = "604800"
UPLOAD_URL_TTL_SECONDS = "900"
DOWNLOAD_URL_TTL_SECONDS = "900"

# Secrets, set with:
# wrangler secret put PORTAL_PASSWORD
# wrangler secret put SESSION_SECRET
# wrangler secret put DEVICE_TOKEN
# wrangler secret put R2_ACCESS_KEY_ID
# wrangler secret put R2_SECRET_ACCESS_KEY
